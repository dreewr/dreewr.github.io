<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leilões — Imóveis em análise</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="app-page">
  <a href="#main-content" class="skip-link">Pular para o conteúdo</a>

  <header class="site-header" role="banner">
    <div class="header-left">
      <h1 class="site-title">Imóveis em análise</h1>
    </div>
    <div class="header-actions">
      <a class="header-link" href="index.html">📚 Documentação</a>
      <a class="header-link primary" href="analise.html">➕ Analisar novo imóvel</a>
    </div>
  </header>

  <main id="main-content" class="app-main" tabindex="-1">
    <section class="toolbar">
      <div class="toolbar-left">
        <label for="filtro-status">Filtrar:</label>
        <select id="filtro-status">
          <option value="">Todos</option>
          <option value="fase1_passou">Fase 1 passou</option>
          <option value="fase1_pendente_pesquisa">Pendente pesquisa</option>
          <option value="fase1_falhou_gates">Falhou gates</option>
          <option value="descartado">Descartado</option>
        </select>
        <span id="contagem" class="contagem">—</span>
      </div>
      <div class="toolbar-right">
        <button type="button" class="btn-secundario" id="btn-exportar">⬇ Exportar CSV</button>
      </div>
    </section>

    <div id="lista-wrap">
      <p class="placeholder" id="placeholder-lista">Carregando…</p>
      <table class="lista-imoveis" id="tabela-imoveis" hidden>
        <thead>
          <tr>
            <th>Imóvel</th>
            <th>Link</th>
            <th>Status</th>
            <th>Lucro %</th>
            <th>Lance máx</th>
            <th>Atualizado</th>
            <th class="col-acoes" aria-label="Ações"></th>
          </tr>
        </thead>
        <tbody id="tabela-imoveis-body"></tbody>
      </table>

      <div class="paginacao" id="paginacao" hidden>
        <button type="button" id="pag-prev">◀ Anterior</button>
        <span id="pag-info">página 1</span>
        <button type="button" id="pag-next">Próxima ▶</button>
      </div>
    </div>
  </main>

  <!-- Modal de confirmação para remoção -->
  <div id="modal-remover" class="modal-bg" hidden>
    <div class="modal-box" role="dialog" aria-labelledby="modal-titulo">
      <h2 id="modal-titulo">Remover imóvel?</h2>
      <p>
        Isso apaga <strong>permanentemente</strong> o JSON da análise e os PDFs
        anexos (edital e matrícula) deste imóvel. Não dá pra desfazer.
      </p>
      <p class="modal-id"><code id="modal-id-display"></code></p>
      <div class="modal-acoes">
        <button type="button" class="btn-secundario" id="modal-cancelar">Cancelar</button>
        <button type="button" class="btn-destrutivo" id="modal-confirmar">Sim, remover</button>
      </div>
    </div>
  </div>

  <script src="api-base.js"></script>
  <script src="imoveis.js"></script>
</body>
</html>
