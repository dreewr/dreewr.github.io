<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leilões de Imóveis — Visualizador</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Pular para o conteúdo</a>

  <header class="site-header" role="banner">
    <div class="header-left">
      <button type="button" id="sidebar-toggle" class="sidebar-toggle" aria-label="Mostrar/ocultar navegação" aria-expanded="true" aria-controls="sidebar">
        <span aria-hidden="true">☰</span>
      </button>
      <h1 class="site-title">Leilões de Imóveis</h1>
    </div>
    <div class="header-actions">
      <label class="font-control">
        <span class="visually-hidden">Tamanho da fonte</span>
        <button type="button" id="font-smaller" class="font-btn" aria-label="Diminuir tamanho da fonte">A−</button>
        <button type="button" id="font-larger" class="font-btn" aria-label="Aumentar tamanho da fonte">A+</button>
      </label>
      <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Alternar tema claro/escuro">
        <span aria-hidden="true" id="theme-icon">🌓</span>
        <span class="visually-hidden" id="theme-label">Tema automático</span>
      </button>
    </div>
  </header>

  <div class="layout">
    <nav class="sidebar" id="sidebar" aria-label="Navegação pelos documentos">
      <h2 class="sidebar-title">Documentos</h2>
      <div id="tree" class="tree" role="tree" aria-label="Árvore de arquivos do repositório">
        <p class="placeholder">Carregando árvore…</p>
      </div>
    </nav>

    <main id="main-content" class="content" tabindex="-1">
      <article id="article" class="markdown-body" aria-live="polite" aria-busy="false">
        <p class="placeholder">Carregando…</p>
      </article>
      <footer class="content-footer">
        <p class="file-meta">
          <span class="file-meta-label">Arquivo:</span>
          <code id="file-meta-path">—</code>
        </p>
      </footer>
    </main>
  </div>

  <script src="vendor/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
